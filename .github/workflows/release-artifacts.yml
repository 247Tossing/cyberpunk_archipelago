# Builds cyberpunk2077.apworld + CyberpunkArchipelagoMod_(version).zip on Windows.
# See tools/README.md → "GitHub Actions" for how to trigger and download artifacts.

name: Release artifacts

on:
  workflow_dispatch:
    inputs:
      archipelago_repository:
        description: "Archipelago repo to build against (owner/name)."
        default: "ArchipelagoMW/Archipelago"
        required: true
      archipelago_ref:
        description: "Archipelago ref (branch, tag, or SHA)."
        default: "main"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout mod
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # workflow_dispatch inputs are absent on tag pushes — use explicit fallbacks.
      - name: Checkout Archipelago
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.archipelago_repository || 'ArchipelagoMW/Archipelago' }}
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.archipelago_ref || 'main' }}
          path: Archipelago

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "~3.12"

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Setup OpenSSL
        shell: pwsh
        run: |
          choco install openssl --no-progress -y
          $candidates = @(
            "C:\Program Files\OpenSSL-Win64",
            "C:\Program Files\OpenSSL"
          )
          $root = $candidates | Where-Object { Test-Path "$_\include\openssl\ssl.h" } | Select-Object -First 1
          if (-not $root) {
            throw "OpenSSL headers not found after installation."
          }
          "OPENSSL_ROOT_DIR=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release artifacts
        shell: pwsh
        env:
          ARCHIPELAGO_ROOT: ${{ github.workspace }}/Archipelago
        run: |
          $tagArg = @()
          if ("${{ github.ref_type }}" -eq "tag") {
            $tagArg = @("--require-tag-version", "${{ github.ref_name }}")
          }
          python tools/build_release.py --skip-submodules @tagArg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cyberpunk-archipelago-release
          path: |
            build/cyberpunk2077.apworld
            build/cyberpunk2077_poptracker_*.zip
            build/CyberpunkArchipelagoMod_*.zip
          if-no-files-found: error
