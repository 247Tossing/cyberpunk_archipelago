# Weapon vendors
# Archipelago vendor sanity — 2nd Amendment + gunsmith VendorCheck items and weapon vendor stock.
# TweakXL loads all .yaml here; numeric prefix keeps vendor_checks_0_common before other files.


Items.VendorCheck_2ndAmendment_1:
  $base: Items.GenericJunkItem1
  icon: UIIcon.APLogo
  displayName: "LocKey#VendorCheck_Fallback_1_Name"
  localizedDescription: "LocKey#VendorCheck_Fallback_1_Desc"
  icon:
    atlasResourcePath: Archipelago\ap-icons.inkatlas
    atlasPartName: color-icon
  tags:
    - VendorCheck_2ndAmendment_1
  quality: Quality.Common
  buyPrice:
    - Items.APCheck_Price_Excluded

Items.VendorCheck_2ndAmendment_2:
  $base: Items.GenericJunkItem1
  icon: UIIcon.APLogo
  displayName: "LocKey#VendorCheck_Fallback_1_Name"
  localizedDescription: "LocKey#VendorCheck_Fallback_1_Desc"
  icon:
    atlasResourcePath: Archipelago\ap-icons.inkatlas
    atlasPartName: color-icon
  tags:
    - VendorCheck_2ndAmendment_2
  quality: Quality.Epic
  buyPrice:
    - Items.APCheck_Price_Standard

Items.VendorCheck_2ndAmendment_3:
  $base: Items.GenericJunkItem1
  icon: UIIcon.APLogo
  displayName: "LocKey#VendorCheck_Fallback_1_Name"
  localizedDescription: "LocKey#VendorCheck_Fallback_1_Desc"
  icon:
    atlasResourcePath: Archipelago\ap-icons.inkatlas
    atlasPartName: color-icon
  tags:
    - VendorCheck_2ndAmendment_3
  quality: Quality.Legendary
  buyPrice:
    - Items.APCheck_Price_Priority
# 2nd Amendment (Kabuki) — stock must attach to the vendor the player interacts with
# (`Character.wat_kab_gunsmith_01` → `Vendors.wat_kab_gunsmith_01`), not Little China.
Vendors.wat_kab_gunsmith_01:
  itemStock:
    - !append
      $type: VendorItem
      item: Items.VendorCheck_2ndAmendment_1
      quantity: [ Vendors.Always_Present ]
    - !append
      $type: VendorItem
      item: Items.VendorCheck_2ndAmendment_2
      quantity: [ Vendors.Always_Present ]
    - !append
      $type: VendorItem
      item: Items.VendorCheck_2ndAmendment_3
      quantity: [ Vendors.Always_Present ]

