# Shared price modifiers
# Archipelago vendor sanity — Items.APCheck_Price_* used by VendorCheck item buyPrice.
# TweakXL loads all .yaml here; numeric prefix keeps vendor_checks_0_common before other files.

Items.APCheck_Price_Priority:
  $type: ConstantStatModifier
  statType: BaseStats.Price
  modifierType: Additive
  value: 5000

Items.APCheck_Price_Standard:
  $type: ConstantStatModifier
  statType: BaseStats.Price
  modifierType: Additive
  value: 2500

Items.APCheck_Price_Excluded:
  $type: ConstantStatModifier
  statType: BaseStats.Price
  modifierType: Additive
  value: 1000
